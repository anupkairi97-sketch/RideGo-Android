workflows:
  ridego-android:
    name: RideGo Android APK
    max_build_duration: 60
    environment:
      node: 18
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
    scripts:
      - name: Install npm dependencies
        script: |
          npm install

      - name: Build the web app (Vite)
        script: |
          npm run build

      - name: Add Android platform if missing, then sync
        script: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          npx cap sync android

      - name: Build Android debug APK
        script: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug
           echo "SHA1 Fingerprint:"
           ./gradlew signingReport

    artifacts:
      - android/app/build/outputs/**/*.apk

    publishing:
      email:
        recipients:
          - your-email@example.com
        notify:
          success: true
          failure: true
