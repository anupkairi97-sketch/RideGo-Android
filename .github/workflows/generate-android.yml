name: Generate Android Project

# Run this manually from the "Actions" tab whenever you need to (re)create
# the android/ folder, or automatically whenever package.json changes.
on:
  workflow_dispatch:
  push:
    paths:
      - "package.json"
      - "capacitor.config.json"

permissions:
  contents: write

jobs:
  generate-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install npm dependencies
        run: npm install

      - name: Build the web app
        run: npm run build

      - name: Add Android platform (only if it doesn't exist yet)
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Sync web build into the Android project
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Commit the generated android/ folder back to the repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f android
          git diff --cached --quiet && echo "No changes to commit" || git commit -m "chore: generate/update Capacitor android project"
          git push
